<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 רמבו — משפחת קרתא</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 40%, #2d1b69 100%);
  color: #e8e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}
.container {
  text-align: center;
  max-width: 600px;
}
h1 {
  font-size: 2.5em;
  font-weight: 900;
  background: linear-gradient(135deg, #f5e78a, #d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  line-height: 1.3;
}
.subtitle {
  color: #a8a8c8;
  font-size: 1.1em;
  margin-bottom: 40px;
  font-weight: 300;
}
.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 24px 30px;
  text-decoration: none;
  color: #e8e8f0;
  display: flex;
  align-items: center;
  gap: 18px;
  transition: all 0.3s;
  text-align: right;
}
.card:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
  border-color: #d4af37;
}
.card-icon {
  font-size: 2em;
  width: 50px;
  text-align: center;
}
.card-content { flex: 1; }
.card-title {
  font-size: 1.2em;
  font-weight: 700;
  color: #f5e78a;
  margin-bottom: 4px;
}
.card-desc {
  font-size: 0.9em;
  color: #8888aa;
}
.card-arrow {
  font-size: 1.5em;
  color: #d4af37;
  opacity: 0.5;
  transition: opacity 0.3s;
}
.card:hover .card-arrow { opacity: 1; }
.footer {
  margin-top: 50px;
  color: #555577;
  font-size: 0.85em;
}
</style>
</head>
<body>
<div class="container">
  <h1>🤖 הדף של רמבו<br>הAI של משפחת קרתא</h1>
  <div class="subtitle">משפחת קרתא</div>

  <div class="cards">
    <a class="card" href="/karta/dubai/">
      <div class="card-icon">🌴</div>
      <div class="card-content">
        <div class="card-title">דובאי 2026</div>
        <div class="card-desc">חופשה משפחתית · 4–11 באוגוסט · מידע, מסלול וספירה לאחור</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
  </div>

  <div class="footer">🤖 רמבו</div>
</div>
</body>
</html>
