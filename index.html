<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רמבו — משפחת קרתא</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

:root {
  --gold: #d4af37;
  --gold-light: #f5e78a;
  --deep-bg: #0a0a1a;
  --card-bg: rgba(255,255,255,0.04);
  --card-border: rgba(255,255,255,0.06);
  --text-primary: #f0eee8;
  --text-secondary: #9898b0;
  --text-muted: #666680;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--deep-bg);
  background-image: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(212,175,55,0.05) 0%, transparent 60%);
  color: var(--text-primary);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.container {
  text-align: center;
  max-width: 520px;
  width: 100%;
}

h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.3;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 1.1rem;
  font-weight: 300;
  margin-bottom: 44px;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 20px 24px;
  text-decoration: none;
  color: inherit;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.25s ease;
  text-align: right;
}

.card:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(212,175,55,0.3);
  transform: translateY(-2px);
}

.card-icon {
  font-size: 1.8rem;
  width: 44px;
  text-align: center;
  flex-shrink: 0;
}

.card-content { flex: 1; min-width: 0; }

.card-title {
  font-weight: 600;
  color: var(--gold-light);
  font-size: 1.05rem;
  margin-bottom: 2px;
}

.card-desc {
  color: var(--text-muted);
  font-size: 0.85rem;
}

.card-arrow {
  color: var(--gold);
  font-size: 1.3rem;
  opacity: 0.3;
  transition: opacity 0.2s;
  flex-shrink: 0;
}

.card:hover .card-arrow { opacity: 0.8; }

.footer {
  margin-top: 48px;
  color: var(--text-muted);
  font-size: 0.8rem;
}
</style>
</head>
<body>
<div class="container">
  <h1>הדף של רמבו<br>הAI של משפחת קרתא</h1>
  <div class="subtitle">משפחת קרתא</div>

  <div class="cards">
    <a class="card" href="/karta/dubai/">
      <div class="card-icon">🌴</div>
      <div class="card-content">
        <div class="card-title">דובאי 2026</div>
        <div class="card-desc">חופשה משפחתית · 4–11 באוגוסט</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
  </div>

  <div class="footer">רמבו · 2026</div>
</div>
</body>
</html>
